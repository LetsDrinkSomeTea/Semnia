services:
  backend:
    build: ./backend
    volumes:
      - ./data:/data
      - semnia-model-cache:/model-cache
    environment:
      - DB_PATH=/data/wissensdatenbank.sqlite
      - UPLOAD_PATH=/data/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    volumes:
      - ./custom:/custom:ro
    depends_on:
      - backend

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm

volumes:
  semnia-model-cache:
  ollama_data:
