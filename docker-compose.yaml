services:
  app:
    image: ghcr.io/letsdrinksometea/semnia:main
    container_name: semnia
    env_file: .env
    build: .
    restart: unless-stopped
    ports:
      - "3000:8000"
    volumes:
      - data:/data
      - semnia-model-cache:/model-cache
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=semnia_local_dev_key

  ollama:
    image: ollama/ollama
    container_name: semnia-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm

  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: semnia-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=semnia_local_dev_key
    volumes:
      - meili_data:/meili_data

volumes:
  data:
  semnia-model-cache:
  ollama_data:
  meili_data:
