services:
  app:
    image: ghcr.io/letsdrinksometea/semnia:main
    build: .
    restart: unless-stopped
    ports:
      - "3000:8000"
    volumes:
      - data:/data
      - semnia-model-cache:/model-cache
      - ./custom:/custom:ro
    environment:
      - TZ=${TZ}
      - DB_PATH=/data/wissensdatenbank.sqlite
      - UPLOAD_PATH=/data/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - llm

volumes:
  data:
  semnia-model-cache:
  ollama_data:
