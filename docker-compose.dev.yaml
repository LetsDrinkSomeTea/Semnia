services:
  backend:
    build:
      context: .
      target: backend        # skips the frontend Node stage
    restart: unless-stopped
    volumes:
      - ./backend/app:/backend/app   # hot reload: mounts source over baked image
      - data-dev:/data
      - semnia-model-cache:/model-cache
    environment:
      - EMBEDDING_MODEL=intfloat/multilingual-e5-large
      # - OLLAMA_URL=http://ollama:11434
      # - OLLAMA_MODEL=llama3.2:1b
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  frontend:
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules  # named volume keeps node_modules across restarts
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=http://backend:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      backend:
        condition: service_healthy

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    volumes:
      - ollama-dev:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 8 && ollama pull llama3.2:1b; wait"]
    profiles:
      - llm

volumes:
  data-dev:
  semnia-model-cache:
  frontend_nm:
  ollama-dev:
